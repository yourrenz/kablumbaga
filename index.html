<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kaplumbağa Terbiyecisi AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      .mindar-ui-loading { display: none !important; }
      .mindar-ui-overlay { display: none !important; }

      /* GÜNLÜKLER KUTUSU */
      #version-box {
        position: fixed; top: 10px; right: 10px; width: 170px;
        background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
        border-radius: 8px; font-size: 11px; z-index: 10000;
        backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
      }

      /* BAŞLAT EKRANI */
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; text-align: center;
      }
      #start-button {
        padding: 15px 40px; font-size: 18px; font-weight: bold;
        background: #c6a15b; /* Tablo tonlarına uygun altın rengi */
        color: white; border: none; border-radius: 30px;
        cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(198, 161, 91, 0.5);
      }

      /* TARAMA REHBERİ */
      #scanning-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 999;
        background: url('https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/examples/image-tracking/assets/card-example/softmind/overlay.png') no-repeat center center;
        background-size: 80%; opacity: 0.5;
      }
    </style>
  </head>
  <body>

    <div id="version-box">
      <strong>Kaplumbağa AR v1.2.0</strong><br>
      - Kaplumbağa Terbiyecisi aktif.<br>
      - Video dikey (9:16) ayarlandı.
    </div>

    <div id="start-screen">
      <h1>Kaplumbağa Terbiyecisi AR</h1>
      <p>Deneyimi başlatmak için butona dokunun</p>
      <button id="start-button">DENEYİMİ BAŞLAT</button>
    </div>

    <div id="scanning-overlay"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="turtleVideo" src="./kaplumbag.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <a-video 
          id="ar-video" 
          src="#turtleVideo" 
          width="1" 
          height="1.78" 
          position="0 0 0"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const startScreen = document.getElementById('start-screen');
      const startButton = document.getElementById('start-button');
      const scanningOverlay = document.getElementById('scanning-overlay');
      const video = document.getElementById('turtleVideo');
      const target = document.getElementById('mytarget');

      startButton.addEventListener('click', () => {
        startScreen.style.display = 'none';
        scanningOverlay.style.display = 'block';
        
        // Tarayıcıların otomatik oynatma engelini aşmak için kısa bir oynat-duraklat
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
        }).catch(err => {
          console.warn("Video yükleme uyarısı:", err);
        });
      });

      target.addEventListener("targetFound", () => {
        scanningOverlay.style.display = 'none';
        video.play();
      });

      target.addEventListener("targetLost", () => {
        scanningOverlay.style.display = 'block';
        video.pause();
      });
    </script>
  </body>
</html>
