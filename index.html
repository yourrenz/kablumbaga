<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kaplumbağa AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; gap: 12px;
      }
      #start-button {
        padding: 15px 30px; font-size: 20px; background: #2ecc71;
        color: white; border: none; border-radius: 10px; cursor: pointer;
      }
      #info-text {
        font-size: 13px; color: rgba(255,255,255,0.6);
        text-align: center; max-width: 280px; line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <button id="start-button">AR DENEYİMİNİ BAŞLAT</button>
      <!-- DÜZELTME 3: Kullanıcıyı bilgilendir -->
      <p id="info-text">Başlatmak için kamera iznine ihtiyaç duyulacaktır.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; uiScanning: no;"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- DÜZELTME 1: muted eklendi (iOS zorunluluğu), preload düzeltildi, loop düzeltildi -->
        <!-- DÜZELTME 4: crossorigin kaldırıldı (aynı sunucudan yükleniyorsa gereksiz) -->
        <video 
          id="turtleVideo" 
          preload="metadata" 
          loop 
          muted
          playsinline 
          webkit-playsinline>
          <!-- DÜZELTME 2: source etiketi ile MIME türü belirtildi -->
          <source src="kaplumbag.mp4" type="video/mp4" />
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <!-- DÜZELTME 5: 16:9 video için en/boy oranı düzeltildi -->
        <a-video 
          src="#turtleVideo" 
          width="1.777" 
          height="1" 
          position="0 0 0"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.getElementById('start-button');
      const startScreen = document.getElementById('start-screen');
      const video = document.getElementById('turtleVideo');

      startButton.addEventListener('click', () => {
        startScreen.style.display = 'none';
        // iOS için tarayıcı kilidini açıyoruz (muted + play zorunlu)
        video.muted = true;
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
          console.log("Video hazır.");
        }).catch(err => {
          console.warn("Video ön oynatma hatası:", err);
        });
      });

      const target = document.getElementById('mytarget');

      target.addEventListener("targetFound", () => {
        video.currentTime = 0;
        video.play().catch(err => console.warn("targetFound play hatası:", err));
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
