<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kaplumbağa AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; gap: 12px;
      }
      #start-button {
        padding: 15px 30px; font-size: 20px; background: #2ecc71;
        color: white; border: none; border-radius: 10px; cursor: pointer;
      }
      #info-text {
        font-size: 13px; color: rgba(255,255,255,0.6);
        text-align: center; max-width: 280px; line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <button id="start-button">AR DENEYİMİNİ BAŞLAT</button>
      <p id="info-text">Başlatmak için kamera iznine ihtiyaç duyulacaktır.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; uiScanning: no;"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video 
          id="turtleVideo" 
          preload="auto" 
          loop 
          muted
          playsinline 
          webkit-playsinline>
          <source src="kaplumbag.mp4" type="video/mp4" />
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <a-video 
          src="#turtleVideo" 
          width="1" 
          height="0.5625" 
          position="0 0 0"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      // STABİLİTE: Tüm DOM yüklendikten sonra kodun çalışmasını garanti altına alıyoruz
      document.addEventListener("DOMContentLoaded", function() {
        const startButton = document.getElementById('start-button');
        const startScreen = document.getElementById('start-screen');
        const video = document.getElementById('turtleVideo');
        const target = document.getElementById('mytarget');

        startButton.addEventListener('click', () => {
          startScreen.style.display = 'none';
          
          // Mobil tarayıcı kilitlerini açmak için ön oynatma
          video.play().then(() => {
            video.pause();
            console.log("Video kilitleri açıldı.");
          }).catch(err => {
            console.warn("Video ön oynatma uyarısı:", err);
          });
        });

        target.addEventListener("targetFound", () => {
          // ANDROİD DONMA ÇÖZÜMÜ: currentTime = 0 buradan kaldırıldı. Sadece play() tetikleniyor.
          video.play().catch(err => console.warn("Oynatma hatası:", err));
        });

        target.addEventListener("targetLost", () => {
          // Hedef kaybolduğunda video durdurulur ve başa sarılır.
          video.pause();
          video.currentTime = 0; 
        });
      });
    </script>
  </body>
</html>
