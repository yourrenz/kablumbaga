<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Kaplumbağa AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white;
      }
      #start-button {
        padding: 15px 30px; font-size: 20px; background: #2ecc71;
        color: white; border: none; border-radius: 10px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <button id="start-button">AR DENEYİMİNİ BAŞLAT</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="turtleVideo" src="kaplumbag.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <a-video 
          src="#turtleVideo" 
          width="1" 
          height="1" 
          position="0 0 0"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.getElementById('start-button');
      const startScreen = document.getElementById('start-screen');
      const video = document.getElementById('turtleVideo');

      startButton.addEventListener('click', () => {
        startScreen.style.display = 'none';
        // Tarayıcı kilidini açmak için videoyu oynatıp hemen durduruyoruz
        video.play().then(() => {
          video.pause();
          console.log("Video hazır.");
        }).catch(err => {
          console.log("Video oynatma hatası:", err);
        });
      });

      const target = document.getElementById('mytarget');
      target.addEventListener("targetFound", () => {
        video.play();
      });
      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
